name: validation-hooks

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  exposure:
    name: PRES — public repo exposure scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/scan_exposure.js

  complexity:
    name: ACMA — App.tsx complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check_complexity.js

  silent-degradation:
    name: SDS — AI model consistency + swallowed errors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/silent_degradation_sentinel.js

  responsibility:
    name: SRP — @responsibility header
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/check_responsibility.js
